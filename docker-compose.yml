services:
  postgres:
    image: ${POSTGRES_IMAGE:-postgres:16}
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USER:-echo}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-echo}
      POSTGRES_DB: ${DB_NAME:-echo}
    # No ports exposed - internal access only
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - echo-internal
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-echo} -d ${DB_NAME:-echo}"]
      interval: 5s
      timeout: 3s
      retries: 20

  redis:
    image: ${REDIS_IMAGE:-redis:7}
    restart: unless-stopped
    # No ports exposed - internal access only
    volumes:
      - redis_data:/data
    networks:
      - echo-internal
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 20

  migrate:
    image: ${MIGRATE_IMAGE:-migrate/migrate:v4.17.1}
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./migrations:/migrations:ro
    command:
      [
        "-path",
        "/migrations",
        "-database",
        "postgres://${DB_USER:-echo}:${DB_PASSWORD:-echo}@${DB_HOST_DOCKER:-postgres}:${DB_PORT_DOCKER:-5432}/${DB_NAME:-echo}?sslmode=${DB_SSL_MODE:-disable}",
        "up"
      ]
    networks:
      - echo-internal
    restart: "no"

  app:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        GO_VERSION: ${GO_VERSION:-1.25}
        ALPINE_VERSION: ${ALPINE_VERSION:-3.20}
        APP_PORT: ${APP_PORT:-8080}
        BUILD_TAGS: ${BUILD_TAGS:-}
    restart: unless-stopped
    ports:
      - "${APP_PORT:-8080}:${APP_PORT:-8080}"
    environment:
      # Set to 'production' when behind HTTPS reverse proxy (nginx/Caddy)
      # Use 'development' for direct HTTP access without reverse proxy
      APP_ENV: ${APP_ENV:-development}
      SERVER_HOST: ${SERVER_HOST:-0.0.0.0}
      SERVER_PORT: ${APP_PORT:-8080}
      SERVER_READ_TIMEOUT: ${SERVER_READ_TIMEOUT:-10s}
      SERVER_WRITE_TIMEOUT: ${SERVER_WRITE_TIMEOUT:-10s}
      SERVER_SHUTDOWN_TIMEOUT: ${SERVER_SHUTDOWN_TIMEOUT:-10s}
      SERVER_RATE_LIMIT_REQUESTS: ${SERVER_RATE_LIMIT_REQUESTS:-120}
      SERVER_RATE_LIMIT_WINDOW: ${SERVER_RATE_LIMIT_WINDOW:-1m}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-*}
      APP_PUBLIC_URL: ${APP_PUBLIC_URL:-http://localhost:5173}
      DB_HOST: ${DB_HOST_DOCKER:-postgres}
      DB_PORT: ${DB_PORT_DOCKER:-5432}
      DB_USER: ${DB_USER:-echo}
      DB_PASSWORD: ${DB_PASSWORD:-echo}
      DB_NAME: ${DB_NAME:-echo}
      DB_SSL_MODE: ${DB_SSL_MODE:-disable}
      REDIS_ADDR: ${REDIS_ADDR_DOCKER:-redis:6379}
      REDIS_PASSWORD: ${REDIS_PASSWORD:-}
      REDIS_DB: ${REDIS_DB:-0}
      JWT_SECRET: ${JWT_SECRET:-change-me-in-production}
      JWT_TTL: ${JWT_TTL:-24h}
      MODERATION_AUTO_HIDE_THRESHOLD: ${MODERATION_AUTO_HIDE_THRESHOLD:-3}
      ONION_ADDRESS: ${ONION_ADDRESS:-}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    networks:
      - echo-internal
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:${APP_PORT:-8080}/health"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 40s

  swagger-ui:
    image: ${SWAGGER_UI_IMAGE:-docker.swagger.io/swaggerapi/swagger-ui:latest}
    restart: unless-stopped
    ports:
      - "${SWAGGER_PORT:-8081}:8080"
    environment:
      URL: ${SWAGGER_URL:-http://app:8080/swagger/doc.json}
    depends_on:
      - app
    networks:
      - echo-internal

networks:
  echo-internal:
    driver: bridge

volumes:
  postgres_data:
  redis_data:
